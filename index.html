<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Weather DaData Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--sec-bg);
            border-radius: 12px;
            background: var(--sec-bg);
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        /* Выпадающий список подсказок DaData */
        .suggestions {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            background: var(--bg-color);
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .suggestion-item {
            padding: 12px 15px;
            border-bottom: 1px solid var(--sec-bg);
            cursor: pointer;
            font-size: 14px;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        /* Карточка погоды */
        .weather-card {
            margin-top: 25px;
            padding: 20px;
            background: var(--sec-bg);
            border-radius: 20px;
            text-align: center;
            display: none;
        }

        .temp {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .city-name {
            font-size: 18px;
            color: var(--hint-color);
        }

        .loading {
            display: none;
            margin-top: 20px;
            color: var(--hint-color);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Погода по адресу 📍</h1>

        <div class="search-box">
            <input type="text" id="addressInput" placeholder="Введите город или адрес..." autocomplete="off">
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div id="loading" class="loading">⏳ Загрузка погоды...</div>

        <div id="weatherCard" class="weather-card">
            <div id="resCity" class="city-name"></div>
            <div id="resTemp" class="temp"></div>
            <div id="resDesc" style="text-transform: capitalize;"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const API_KEY_DADATA = "170bea2649a999c8e1fb7e0c053cbe659e00991b";
        const addressInput = document.getElementById('addressInput');
        const suggestionsBox = document.getElementById('suggestions');
        const weatherCard = document.getElementById('weatherCard');
        const loading = document.getElementById('loading');

        // 1. Поиск подсказок через DaData
        addressInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 3) {
                suggestionsBox.style.display = 'none';
                return;
            }

            try {
                const response = await fetch("https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address", {
                    method: "POST",
                    mode: "cors",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json",
                        "Authorization": "Token " + API_KEY_DADATA
                    },
                    body: JSON.stringify({ query: query, count: 5, from_bound: { value: "city" } })
                });
                const result = await response.json();
                showSuggestions(result.suggestions);
            } catch (error) {
                console.error("DaData error:", error);
            }
        });

        function showSuggestions(list) {
            if (!list.length) {
                suggestionsBox.style.display = 'none';
                return;
            }
            suggestionsBox.innerHTML = '';
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.textContent = item.value;
                div.onclick = () => selectCity(item);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        }

        // 2. Выбор города и запрос погоды по координатам
        async function selectCity(item) {
            addressInput.value = item.value;
            suggestionsBox.style.display = 'none';

            const lat = item.data.geo_lat;
            const lon = item.data.geo_lon;

            if (!lat || !lon) {
                alert("Координаты города не найдены");
                return;
            }

            getWeather(lat, lon, item.value);
        }

        async function getWeather(lat, lon, cityName) {
            loading.style.display = 'block';
            weatherCard.style.display = 'none';

            try {
                // Используем Open-Meteo 
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
                const response = await fetch(url);
                const data = await response.json();

                const current = data.current_weather;

                document.getElementById('resCity').textContent = cityName;
                document.getElementById('resTemp').textContent = Math.round(current.temperature) + "°C";
                document.getElementById('resDesc').textContent = getWeatherDesc(current.weathercode);

                weatherCard.style.display = 'block';
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            } catch (error) {
                alert("Ошибка при получении погоды");
            } finally {
                loading.style.display = 'none';
            }
        }

        // Коды погоды по стандарту WMO
        function getWeatherDesc(code) {
            const mapping = {
                0: "Ясно ☀️",
                1: "Преимущественно ясно 🌤",
                2: "Переменная облачность ⛅️",
                3: "Пасмурно ☁️",
                45: "Туман 🌫",
                61: "Небольшой дождь 🌦",
                63: "Дождь 🌧",
                71: "Снегопад ❄️",
                95: "Гроза ⚡️"
            };
            return mapping[code] || "Неизвестно";
        }
    </script>

</body>

</html>
