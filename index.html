<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
            margin-bottom: 24px;
        }

        button:active {
            opacity: 0.7;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 20px;
            text-align: left;
            width: 100%;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
            color: var(--tg-theme-text-color, #000000);
            min-height: 120px;
        }

        .loading {
            display: none;
            margin-top: 16px;
            color: var(--tg-theme-hint-color, #888888);
        }

        .error {
            color: #e53935;
        }
    </style>
</head>

<body>
    <div class="container">
        <button id="fetchButton">📡 Запросить данные</button>
        <div class="result" id="resultArea">
            Нажмите кнопку, чтобы получить результат из API
        </div>
        <div class="loading" id="loadingIndicator">⏳ Загрузка...</div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на всё доступное пространство
        tg.ready();

        // Элементы DOM
        const button = document.getElementById('fetchButton');
        const resultArea = document.getElementById('resultArea');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Пример API: получаем случайный пост с JSONPlaceholder
        const API_URL = 'https://jsonplaceholder.typicode.com/posts/1';

        async function fetchData() {
            // Блокируем кнопку на время запроса
            button.disabled = true;
            loadingIndicator.style.display = 'block';
            resultArea.innerHTML = '';

            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error(`Ошибка HTTP: ${response.status}`);
                }
                const data = await response.json();

                // Формируем красивый вывод
                const output = `
                <strong>📌 ID:</strong> ${data.id}<br>
                <strong>📝 Заголовок:</strong> ${escapeHtml(data.title)}<br>
                <strong>📄 Текст:</strong><br> ${escapeHtml(data.body)}
            `;
                resultArea.innerHTML = output;

                // (Опционально) Вибрация на телефоне, если поддерживается
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            } catch (error) {
                console.error('Ошибка запроса:', error);
                resultArea.innerHTML = `<span class="error">❌ Ошибка: ${error.message}</span><br>Проверьте соединение или попробуйте позже.`;
            } finally {
                button.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        }

        // Простейшая защита от XSS
        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Вешаем обработчик на кнопку
        button.addEventListener('click', fetchData);
    </script>
</body>

</html>
